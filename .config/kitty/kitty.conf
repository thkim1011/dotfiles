# ─────────────────────────────────────────────────────────────────
# Tidepool Neon — Kitty color scheme
# Drop into: ~/.config/kitty/tidepool-neon.conf
# Then in kitty.conf:    include tidepool-neon.conf
# ─────────────────────────────────────────────────────────────────

# Base
background              #0f1420
foreground              #e2eaff
selection_background    #283354
selection_foreground    #e2eaff

# Cursor
cursor                  #5ed3f0
cursor_text_color       #0f1420

# URLs
url_color               #5ed3f0

# Borders
active_border_color     #5ed3f0
inactive_border_color   #34416b
bell_border_color       #f06ec0

# Tabs
active_tab_background   #5ed3f0
active_tab_foreground   #0f1420
inactive_tab_background #1d2640
inactive_tab_foreground #a8b6e0
tab_bar_background      #0f1420

# ── ANSI 16 ──────────────────────────────────────────────────────
# black
color0                  #101626
color8                  #34416b
# red
color1                  #e06b80
color9                  #f06e85
# green
color2                  #5ad3a0
color10                 #74e0b3
# yellow
color3                  #e8c46b
color11                 #f0d088
# blue
color4                  #5ed3f0
color12                 #7ee0ff
# magenta
color5                  #c878e0
color13                 #e090f0
# cyan
color6                  #5ed8d0
color14                 #7ce8e0
# white
color7                  #a8b6e0
color15                 #e2eaff

# ── Recommended kitty.conf settings to pair with this theme ──────
# font_family            JetBrainsMono Nerd Font
# font_size              12.0
# background_opacity     0.92
# background_blur        20
# window_padding_width   10
# hide_window_decorations yes
# cursor_trail           1
enable_audio_bell no
