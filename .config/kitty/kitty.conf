# ─────────────────────────────────────────────────────────────────
# Hallownest Deep — Kitty color scheme
# Drop into: ~/.config/kitty/hallownest-deep.conf
# Then in kitty.conf:    include hallownest-deep.conf
# ─────────────────────────────────────────────────────────────────

# Base
background              #161b26
foreground              #cdd6e8
selection_background    #323c54
selection_foreground    #cdd6e8

# Cursor
cursor                  #7eb6d6
cursor_text_color       #161b26

# URLs
url_color               #7eb6d6

# Borders
active_border_color     #7eb6d6
inactive_border_color   #3a4664
bell_border_color       #d68a93

# Tabs
active_tab_background   #7eb6d6
active_tab_foreground   #161b26
inactive_tab_background #252e42
inactive_tab_foreground #a0adc8
tab_bar_background      #161b26

# ── ANSI 16 ──────────────────────────────────────────────────────
# black
color0                  #1a2030
color8                  #3a4664
# red
color1                  #c97b86
color9                  #d68a93
# green
color2                  #88b8a3
color10                 #9fc9b4
# yellow
color3                  #d4b483
color11                 #e0c598
# blue
color4                  #7eb6d6
color12                 #9bc8e2
# magenta
color5                  #a8a3d6
color13                 #b8b3e0
# cyan
color6                  #8fc4be
color14                 #a3d4cf
# white
color7                  #a8b3c9
color15                 #cdd6e8


# ── Recommended kitty.conf settings to pair with this theme ──────
# font_family            JetBrainsMono Nerd Font
# font_size              12.0
# background_opacity     0.92
# background_blur        20
# window_padding_width   10
# hide_window_decorations yes
# cursor_trail           1
enable_audio_bell no
